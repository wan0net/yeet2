name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  types-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://yeet2:yeet2@127.0.0.1:5432/yeet2
        run: pnpm --filter @yeet2/db exec prisma generate

      - name: Build domain package
        run: pnpm --filter @yeet2/domain build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Run API unit tests
        run: pnpm --filter @yeet2/api exec vitest run

      - name: Run domain tests
        run: pnpm --filter @yeet2/domain exec vitest run

      - name: Run control lib tests
        run: pnpm --filter @yeet2/control exec vitest run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Brain tests
        working-directory: apps/brain
        run: uv run --extra dev pytest tests/ -q

      - name: Run Executor tests
        working-directory: apps/executor
        run: uv run --extra dev pytest tests/ -q

  e2e-tests:
    runs-on: ubuntu-latest
    needs: types-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/control
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://yeet2:yeet2@127.0.0.1:5432/yeet2
        run: pnpm --filter @yeet2/db exec prisma generate

      - name: Build domain package
        run: pnpm --filter @yeet2/domain build

      - name: Build control app
        run: pnpm --filter @yeet2/control build

      - name: Run E2E tests
        working-directory: apps/control
        env:
          BASE_URL: http://localhost:4173
          CI: "true"
        run: |
          pnpm preview --port 4173 &
          sleep 3
          npx playwright test

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yeet2
          POSTGRES_PASSWORD: yeet2
          POSTGRES_DB: yeet2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://yeet2:yeet2@localhost:5432/yeet2_test
        run: pnpm --filter @yeet2/db exec prisma generate

      - name: Build domain package
        run: pnpm --filter @yeet2/domain build

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://yeet2:yeet2@localhost:5432/yeet2_test
        run: pnpm --filter @yeet2/db exec prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://yeet2:yeet2@localhost:5432/yeet2_test
          TEST_DATABASE_URL: postgresql://yeet2:yeet2@localhost:5432/yeet2_test
          YEET2_API_BEARER_TOKEN: test-api-key
        run: pnpm --filter @yeet2/api run test:integration
