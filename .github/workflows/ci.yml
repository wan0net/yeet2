name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  types-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://yeet2:yeet2@127.0.0.1:5432/yeet2
        run: pnpm --filter @yeet2/db exec prisma generate

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Brain and Executor
        run: |
          python -m compileall apps/brain/src/yeet2_brain
          python -m compileall apps/executor/src/yeet2_executor
