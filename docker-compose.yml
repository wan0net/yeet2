services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yeet2
      POSTGRES_PASSWORD: yeet2
      POSTGRES_DB: yeet2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  langfuse-web:
    image: langfuse/langfuse:2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://yeet2:yeet2@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: yeet2-langfuse-dev-secret-change-in-prod
      SALT: yeet2-salt-change-in-prod
      LANGFUSE_INIT_ORG_ID: yeet2-org
      LANGFUSE_INIT_ORG_NAME: yeet2
      LANGFUSE_INIT_PROJECT_ID: yeet2-project
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-yeet2-dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-yeet2-dev
      TELEMETRY_ENABLED: "false"
    ports:
      - "3002:3000"
    depends_on:
      - postgres

  # Langfuse env vars to set in your .env or app services:
  # LANGFUSE_PUBLIC_KEY=pk-lf-yeet2-dev
  # LANGFUSE_SECRET_KEY=sk-lf-yeet2-dev
  # LANGFUSE_HOST=http://localhost:3002

volumes:
  postgres_data:
  redis_data:

